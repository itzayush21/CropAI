<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Address → Lat/Lon (OpenCage API)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f9f9f9;
      color: #333;
    }
    input {
      width: 60%;
      padding: 8px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      padding: 8px 16px;
      font-size: 16px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #3367d6;
    }
    pre {
      margin-top: 20px;
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>
  <h2>Get Latitude and Longitude from Address</h2>
  <input id="addr" placeholder="Enter address (e.g. 93/C Bagstation Road, Halisahar, West Bengal)">
  <button id="go">Find</button>
  <pre id="out"></pre>

  <script>
    const apiKey = "7edf47c44cce409b892facc8ba369bbf";  // ⬅️ Replace this with your real key

    document.getElementById('go').onclick = async () => {
      const addr = document.getElementById('addr').value.trim();
      const output = document.getElementById('out');
      output.textContent = "Searching...";
      
      if (!addr) return alert('Type an address');
      
      const url = `https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(addr)}&key=${apiKey}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        if (!data.results || data.results.length === 0) {
          output.textContent = "No results found. Try a broader or corrected address.";
          return;
        }

        const top = data.results[0];
        const { lat, lng } = top.geometry;
        const formatted = top.formatted;
        const confidence = top.confidence;

        output.textContent = 
          `Address: ${formatted}\nLatitude: ${lat}\nLongitude: ${lng}\nConfidence: ${confidence}/10`;
      } catch (error) {
        output.textContent = "Error: " + error.message;
      }
    };
  </script>
</body>
</html>
