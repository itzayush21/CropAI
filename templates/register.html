<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CropAI | Register</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    .container {
      width: 90%;
      max-width: 850px;
      margin-top: 3rem;
      margin-bottom: 4rem;
    }

    h2 {
      text-align: center;
      color: #b3ff00;
      font-size: 2.2rem;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
      text-shadow: 0 0 8px rgba(179, 255, 0, 0.4);
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem 2rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 0 25px rgba(179, 255, 0, 0.25);
    }

    input, textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 10px rgba(179, 255, 0, 0.3);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    textarea {
      grid-column: 1 / -1;
      resize: none;
      min-height: 90px;
    }

    #map {
      height: 300px;
      grid-column: 1 / -1;
      border-radius: 15px;
      box-shadow: 0 0 12px rgba(179, 255, 0, 0.25);
      margin: 1rem 0;
    }

    button {
      grid-column: 1 / -1;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #b3ff00, #70ffb3);
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 0.5rem;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 25px #b3ff00;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #b3ff00;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    a:hover {
      text-shadow: 0 0 8px #b3ff00;
    }

    @media (max-width: 600px) {
      form {
        padding: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Register Your Land 🌾</h2>

    <form method="POST">
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="text" name="name" placeholder="Full Name" required />
      <input type="text" name="district" placeholder="District" required />
      <input type="text" name="state" placeholder="State" required />
      <input type="text" name="address" placeholder="Full Address" required />

      <div id="map"></div>

      <input type="text" id="latitude" name="latitude" placeholder="Latitude" readonly required />
      <input type="text" id="longitude" name="longitude" placeholder="Longitude" readonly required />

      <input type="number" step="0.01" name="land_area" placeholder="Land Area (in acres)" required />
      <textarea name="soil_summary" placeholder="Brief Soil Summary" required></textarea>

      <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account? Login</a>
  </div>

  <script>
    var map = L.map('map').setView([22.9734, 78.6569], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    map.on('click', function (e) {
      var lat = e.latlng.lat.toFixed(6);
      var lng = e.latlng.lng.toFixed(6);

      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lng;

      if (marker) map.removeLayer(marker);
      marker = L.marker([lat, lng]).addTo(map)
        .bindPopup("Selected Location:<br>Lat: " + lat + "<br>Lon: " + lng)
        .openPopup();
    });
  </script>
</body>
</html>
