<!DOCTYPE html>
<html>
<head>
<title>CropAI | Nearby Services</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

:root {
    --bg:#0b1410;
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.08);
    --primary:#c4ff61;
    --accent:#7affd8;
    --text:#eaf9e6;
    --sub:#9db59a;
}

body {
    font-family:"Outfit",sans-serif;
    background:linear-gradient(180deg,#0b1410,#0f1d15);
    color:var(--text);
    margin:0;
}

/* HEADER */
.header {
    padding:1.5rem 5%;
    border-bottom:1px solid var(--border);
}
.header h1 { color:var(--primary); }

/* LAYOUT */
.container {
    display:grid;
    grid-template-columns:400px 1fr;
    gap:2rem;
    padding:2rem 5%;
}

/* CARD */
.card {
    background:var(--card);
    border:1px solid var(--border);
    padding:1.5rem;
    border-radius:18px;
}

/* INPUT */
.input-group { margin-bottom:12px; }

label {
    font-size:13px;
    color:var(--sub);
}

input, select, textarea {
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
}

input:focus, textarea:focus {
    border:1px solid var(--primary);
    outline:none;
}

/* LOCKED INPUT */
input[readonly] {
    opacity:0.7;
    cursor:not-allowed;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

/* MAP */
#map {
    height: 500px;
    border-radius: 18px;
    border:1px solid var(--border);
}

/* RESPONSIVE */
@media(max-width:900px){
    .container {
        grid-template-columns:1fr;
    }

    #map {
        height:300px;
    }
}

</style>
</head>

<body>

<div class="header">
<h1>📍 Nearby Services</h1>
<p>Add and discover local agricultural services</p>
</div>

<div class="container">

<!-- LEFT FORM -->
<div class="card">

<h3>Add Service</h3>

<div class="input-group">
<label>Name</label>
<input id="name" placeholder="Service Name">
</div>

<div class="input-group">
<label>Type</label>
<select id="type">
<option value="fertilizer_shop">Fertilizer Shop</option>
<option value="market">Market</option>
<option value="warehouse">Warehouse</option>
<option value="equipment_rental">Equipment Rental</option>
</select>
</div>

<div class="input-group">
<label>Description</label>
<textarea id="desc"></textarea>
</div>

<div class="input-group">
<label>Latitude (from map)</label>
<input id="lat" type="number" step="any" readonly placeholder="Click on map">
</div>

<div class="input-group">
<label>Longitude (from map)</label>
<input id="lng" type="number" step="any" readonly placeholder="Click on map">
</div>

<div class="input-group">
<label>Contact</label>
<input id="contact">
</div>

<div class="input-group">
<label>Address</label>
<input id="address">
</div>

<div class="input-group">
<label>Tags (comma separated)</label>
<input id="tags" placeholder="fertilizer,seed,pesticide">
</div>

<button onclick="addService()">➕ Add Service</button>

</div>

<!-- RIGHT MAP -->
<div class="card">
<h3>Select Location</h3>
<div id="map"></div>
</div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌍 INIT MAP (Chennai default)
const map = L.map('map').setView([13.0827, 80.2707], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let marker;

// 📍 Set lat/lng from map
function setLocation(lat, lng) {
    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;
}

// 📍 On map click
map.on('click', function(e) {

    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    setLocation(lat, lng);

    if (marker) {
        marker.setLatLng(e.latlng);
    } else {
        marker = L.marker(e.latlng).addTo(map);
    }
});

// 🚀 API CALL
async function addService() {

    const payload = {
        name: document.getElementById("name").value,
        type: document.getElementById("type").value,
        description: document.getElementById("desc").value,
        lat: parseFloat(document.getElementById("lat").value),
        lng: parseFloat(document.getElementById("lng").value),
        contact: document.getElementById("contact").value,
        address: document.getElementById("address").value,
        tags: document.getElementById("tags").value.split(",")
    };

    if (!payload.lat || !payload.lng) {
        alert("Please select a location on the map");
        return;
    }

    await fetch("/api/nearby/add", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    alert("✅ Service Added Successfully!");
}

</script>

</body>
</html>
