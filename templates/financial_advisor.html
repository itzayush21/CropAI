<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CropAI | Financial Advisor</title>
    <style>
        :root {
            --accent: #b3ff00;
            --accent2: #70ffb3;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.14);
            --text: #eef2e6;
            --muted: #cbd6cf;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Poppins, system-ui, Arial;
            background: linear-gradient(180deg, #0f2027, #203a43);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            backdrop-filter: blur(8px);
        }

        .logo {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.35rem
        }

        .btn {
            padding: .6rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer
        }

        .btn-cta {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            border: none
        }

        main {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 1.6rem;
            padding: 1.6rem 2rem
        }

        .panel {
            background: rgba(15, 25, 30, 0.6);
            border-radius: 14px;
            padding: 1.2rem;
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            height: calc(100vh - 120px);
            overflow: auto
        }

        h3 {
            margin: 0 0 .6rem 0;
            color: var(--accent);
            font-size: 1.1rem
        }

        label {
            display: block;
            margin-top: .6rem;
            color: var(--muted);
            font-weight: 600;
            font-size: .95rem
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: .9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text);
            margin-top: .3rem;
            outline: none
        }

        textarea {
            min-height: 110px;
            resize: vertical
        }

        .controls {
            display: flex;
            gap: .6rem;
            margin-top: 1rem;
            flex-wrap: wrap
        }

        .chat-window {
            background: rgba(10, 15, 18, 0.6);
            border-radius: 12px;
            padding: 1rem;
            height: calc(100vh - 220px);
            overflow: auto;
            border: 1px solid var(--border)
        }

        .msg {
            margin-bottom: 1rem;
            display: flex
        }

        .bubble {
            padding: .9rem 1.1rem;
            border-radius: 12px;
            max-width: 78%;
            line-height: 1.5
        }

        .user {
            margin-left: auto;
            background: linear-gradient(135deg, rgba(179, 255, 0, .2), rgba(112, 255, 179, .14));
            color: #0b0b0b;
            border: 1px solid rgba(179, 255, 0, .18)
        }

        .bot {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border)
        }

        .chat-input {
            display: flex;
            gap: .6rem;
            margin-top: .8rem
        }

        .result-card {
            background: rgba(30, 40, 45, 0.85);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: .8rem
        }

        .result-card h4 {
            margin: 0;
            color: var(--accent);
            font-size: 1.05rem
        }

        .summary {
            background: rgba(179, 255, 0, 0.08);
            padding: 1rem;
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            margin-top: .6rem;
            color: #0b0b0b
        }

        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        .history-modal.active {
            display: flex;
        }

        .history-body {
            background: rgba(20, 25, 30, 0.96);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 70%;
            max-width: 850px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            animation: popUp 0.25s ease forwards;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
        }

        .modal-header h3 {
            color: var(--accent);
            font-size: 1.2rem;
            margin: 0;
        }

        #closeHistory {
            font-size: 1.1rem;
            padding: 0.4rem 0.8rem;
        }

        .history-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }

        .history-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .history-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 8px;
        }

        .history-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.45);
        }

        .history-scroll details {
            background: rgba(255, 255, 255, 0.06);
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            transition: all 0.25s ease;
        }

        .history-scroll details:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.01);
        }

        .history-scroll summary {
            cursor: pointer;
            color: var(--accent);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .history-scroll pre {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.8rem;
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .meta {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popUp {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .meta {
            font-size: .9rem;
            color: var(--muted);
            margin-top: .4rem
        }

        @media(max-width:980px) {
            main {
                grid-template-columns: 1fr;
                padding: 1rem
            }

            .panel {
                height: auto
            }

            .chat-window {
                height: 60vh
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">💸 CropAI — Financial Advisor</div>
        <div>
            <button class="btn" onclick="location.href='/dashboard'">Dashboard</button>
            <button class="btn btn-cta" id="historyBtn">History</button>
        </div>
    </header>

    <main>
        <!-- left inputs -->
        <section class="panel">
            <h3>Context & Preferences</h3>
            <label>Crop name</label>
            <input id="crop_name" placeholder="e.g., Tomato" />

            <label>Land area (acres)</label>
            <input id="land_area" placeholder="auto from profile or enter value" type="number" step="0.01" />

            <label>Budget preference (₹)</label>
            <input id="budget" placeholder="optional: budget cap" type="number" />

            <label>Market preference</label>
            <select id="market_pref">
                <option value="">Auto</option>
                <option>Local mandi</option>
                <option>Wholesale/Export</option>
                <option>Contract farming</option>
            </select>

            <label>Notes</label>
            <textarea id="notes" placeholder="Any constraints, subsidy availability, prior yields..."></textarea>

            <div class="controls">
                <button class="btn btn-cta" id="genBtn">Get Financial Plan</button>
                <button class="btn" id="clearBtn">Clear Chat</button>
            </div>

            <div class="meta">Tip: After you get a plan you can ask follow-ups like "explain labor costs" or "optimize
                for profit".</div>
        </section>

        <!-- right chat -->
        <section class="panel">
            <div class="chat-window" id="chatWindow">
                <div class="msg bot">
                    <div class="bubble bot">👋 Hi — I'm your Financial Advisor. Provide crop & preferences and press
                        <strong>Get Financial Plan</strong>.
                    </div>
                </div>
            </div>

            <div class="chat-input">
                <input id="userPrompt" placeholder="Ask a follow-up question (e.g., 'explain irrigation cost')" />
                <button class="btn btn-cta" id="sendBtn">Send</button>
            </div>
        </section>
    </main>

    <!-- history modal -->
    <div class="history-modal" id="historyModal">
        <div class="history-body">
            <div class="modal-header">
                <h3>📜 Financial Advice History</h3>
                <button class="btn btn-ghost" id="closeHistory">✕</button>
            </div>

            <div id="historyContent" class="history-scroll"></div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const genBtn = document.getElementById('genBtn');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userPrompt = document.getElementById('userPrompt');
        const historyBtn = document.getElementById('historyBtn');
        const historyModal = document.getElementById('historyModal');
        const closeHistory = document.getElementById('closeHistory');
        const historyContent = document.getElementById('historyContent');

        function addMsg(content, who = 'bot', html = false) {
            const wrap = document.createElement('div'); wrap.className = 'msg ' + who;
            const bubble = document.createElement('div'); bubble.className = 'bubble ' + who;
            if (html) bubble.innerHTML = content; else bubble.textContent = content;
            wrap.appendChild(bubble); chatWindow.appendChild(wrap);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function renderFinancialResult(res) {
            // build a rich HTML card
            const container = document.createElement('div'); container.className = 'result-card';
            const crop = res.crop_name ? `<div style="font-weight:700;color:var(--accent)">${res.crop_name}</div>` : '';
            const reply = res.reply ? `<p>${res.reply}</p>` : '';
            const cb = res.cost_breakdown || {};
            const costLines = Object.keys(cb).length ? `
        <div><strong>Cost breakdown (₹):</strong>
          <ul>
            ${Object.entries(cb).map(([k, v]) => `<li>${k}: ${typeof v === 'number' ? v.toLocaleString() : v}</li>`).join('')}
          </ul>
        </div>` : '';
            const profit = res.expected_profit ? `<div><strong>Expected profit (₹):</strong> ${Number(res.expected_profit).toLocaleString()}</div>` : '';
            const roi = res.roi ? `<div><strong>ROI:</strong> ${res.roi}</div>` : '';
            const tips = res.tips && res.tips.length ? `<div><strong>Tips:</strong><ul>${res.tips.map(t => `<li>${t}</li>`).join('')}</ul></div>` : '';
            const concl = res.conclusion ? `<div class="summary">${res.conclusion}</div>` : '';
            container.innerHTML = `${crop}${reply}${costLines}${profit}${roi}${tips}${concl}`;
            chatWindow.appendChild(container);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function callFinancialAdvisor(extra_query = null) {
            const payload = {
                context: {
                    crop_name: document.getElementById('crop_name').value,
                    land_area: document.getElementById('land_area').value,
                    budget: document.getElementById('budget').value,
                    market_pref: document.getElementById('market_pref').value,
                    notes: document.getElementById('notes').value
                },
                user_query: extra_query
            };
            const resp = await fetch('/api/financial-advisor', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await resp.json();
            if (data.error) { addMsg('Error: ' + data.error, 'bot'); return; }
            // attach crop_name for nicer display
            data.crop_name = payload.context.crop_name || '';
            renderFinancialResult(data);
        }

        genBtn.onclick = () => { addMsg('Generating financial plan...', 'user'); callFinancialAdvisor(); };
        clearBtn.onclick = () => { chatWindow.innerHTML = ''; addMsg('Cleared chat.', 'bot'); };
        sendBtn.onclick = () => { const q = userPrompt.value.trim(); if (!q) return; addMsg(q, 'user'); callFinancialAdvisor(q); userPrompt.value = ''; };
        userPrompt.addEventListener('keydown', (e) => { if (e.key === 'Enter') { sendBtn.click(); } });

        // History
        historyBtn.onclick = async () => {
            // Activate modal with smooth fade
            historyModal.classList.add('active');
            historyContent.innerHTML = `
    <div style="text-align:center; padding:1rem; color:var(--muted); font-size:1rem;">
      ⏳ Fetching your financial history...
    </div>
  `;

            try {
                const res = await fetch('/api/financial-advisor/history');
                const data = await res.json();

                if (!data || !data.length) {
                    historyContent.innerHTML = `
        <div style="text-align:center; color:var(--muted); padding:1rem;">
          No financial history found yet.
        </div>`;
                    return;
                }

                // Helper: safe format & markdown-like support
                const format = (text = '') =>
                    text
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/^- /gm, '• ')
                        .replace(/\n/g, '<br>');

                // Build the formatted history HTML
                historyContent.innerHTML = data
                    .map((r, i) => `
      <details style="
          background: rgba(255,255,255,0.06);
          padding: 1rem;
          margin-bottom: 0.8rem;
          border-radius: 12px;
          border-left: 4px solid var(--accent);
          transition: all 0.25s ease;">
        <summary style="
            cursor: pointer;
            color: var(--accent);
            font-weight: 600;
            font-size: 1.05rem;">
          #${i + 1} ${r.crop_name || '—'} ${r.region ? `• ${r.region}` : ''}
        </summary>

        <div style="margin-top: 0.8rem; line-height: 1.6; color: #eee; font-size: 0.95rem;">
          ${(() => {
                            const conv = r.conversation || {};
                            const reply = conv.reply ? `<p>${format(conv.reply)}</p>` : '';
                            const cost = r.cost_estimate
                                ? `<div><strong>💰 Total Cost:</strong> ₹${r.cost_estimate.toLocaleString()}</div>`
                                : '';
                            const profit = r.expected_profit
                                ? `<div><strong>💹 Expected Profit:</strong> ₹${r.expected_profit.toLocaleString()}</div>`
                                : '';
                            const roi = r.roi ? `<div><strong>📈 ROI:</strong> ${r.roi}</div>` : '';
                            const summary = conv.conclusion
                                ? `<div style="background:rgba(179,255,0,0.08);padding:0.8rem;border-left:3px solid var(--accent);border-radius:8px;margin-top:0.6rem;">
                    <strong>🧩 Summary:</strong><br>${format(conv.conclusion)}
                 </div>`
                                : '';

                            return `${reply}${cost}${profit}${roi}${summary}`;
                        })()}
        </div>

        <div class="meta" style="margin-top:0.6rem; color: var(--muted); font-size: 0.9rem;">
          📅 ${r.created_at || 'Date unknown'}
        </div>
      </details>
    `)
                    .join('');

            } catch (err) {
                console.error(err);
                historyContent.innerHTML = `
      <div style="text-align:center; color:tomato; padding:1rem;">
        ⚠️ Unable to fetch history. Please try again later.
      </div>`;
            }
        };

        // Close modal (button or background click)
        closeHistory.onclick = () => {
            historyModal.classList.remove('active');
        };

        // Optional: Close when clicking outside the dialog box
        window.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                historyModal.classList.remove('active');
            }
        });

    </script>
</body>

</html>
