
<!DOCTYPE html>
<html>
<head>
<title>Inventory Manager | CropAI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   DESIGN SYSTEM
========================= */
:root {
    --bg: #0b1410;
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --primary: #c4ff61;
    --accent: #7affd8;
    --danger: #ff6b6b;
    --text: #eaf9e6;
    --subtext: #9db59a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Outfit", sans-serif;
    background: linear-gradient(180deg, #0b1410, #0f1d15);
    color: var(--text);
}

/* HEADER */
.header {
    padding: 1.5rem 5%;
    border-bottom: 1px solid var(--border);
}

.header h1 {
    color: var(--primary);
}

/* LAYOUT */
.dashboard {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 2rem;
    padding: 2rem 5%;
}

/* CARD */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.5rem;
    border-radius: 18px;
    margin-bottom: 1rem;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
}

/* INPUT */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
}

input:focus, select:focus {
    border: 1px solid var(--primary);
    outline: none;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    cursor: pointer;
    font-weight: 600;
}

button:hover {
    transform: scale(1.05);
}

/* LIST */
#list {
    max-height: 400px;
    overflow-y: auto;
}

.item {
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.04);
}

.low {
    border: 1px solid var(--danger);
}

/* TAG */
.tag {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
}

.stat {
    flex: 1;
    background: rgba(255,255,255,0.04);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

.stat h2 {
    color: var(--primary);
}

/* ALERT */
.alert {
    background: rgba(255,107,107,0.15);
    border: 1px solid var(--danger);
    padding: 10px;
    border-radius: 10px;
    margin-top: 8px;
}

/* RESPONSIVE */
@media(max-width: 900px) {
    .dashboard {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="header">
    <h1>📦 Inventory Manager</h1>
    <p>Smart farm resource tracking</p>
</div>

<div class="dashboard">

<!-- LEFT -->
<div>

<div class="card">
<h3>Add Inventory</h3>

<input id="name" placeholder="Item Name">

<select id="category" onchange="updateUnits()">
<option value="Seeds">Seeds 🌱</option>
<option value="Fertilizer">Fertilizer 💧</option>
<option value="Pesticide">Pesticide 🐛</option>
<option value="Equipment">Equipment ⚙️</option>
<option value="Tools">Tools 🔧</option>
<option value="Fuel">Fuel ⛽</option>
</select>

<select id="unit"></select>

<input id="quantity" type="number" placeholder="Quantity">
<input id="threshold" type="number" placeholder="Low Threshold">
<input id="usage_rate" type="number" placeholder="Daily Usage">
<input id="expiry" type="date">

<button onclick="addItem()">Add Item</button>
</div>

<div class="card">
<h3>Inventory</h3>
<div id="list"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<h3>📊 Stats</h3>
<div class="stats">
<div class="stat"><h2 id="total">0</h2><p>Total</p></div>
<div class="stat"><h2 id="low">0</h2><p>Low</p></div>
<div class="stat"><h2 id="types">0</h2><p>Types</p></div>
</div>
</div>

<div class="card">
<h3>⚠️ Alerts</h3>
<div id="alerts"></div>
</div>

</div>

</div>

<script>

/* MOCK DATABASE */
let inventory = [];
let idCounter = 1;

/* CATEGORY → UNITS */
const unitMap = {
    Seeds: ["kg","grams"],
    Fertilizer: ["kg","bags"],
    Pesticide: ["liters","ml"],
    Equipment: ["units"],
    Tools: ["units"],
    Fuel: ["liters"]
};

function updateUnits() {
    const cat = document.getElementById("category").value;
    const unit = document.getElementById("unit");
    unit.innerHTML = "";
    unitMap[cat].forEach(u => unit.innerHTML += `<option>${u}</option>`);
}
updateUnits();

/* ADD ITEM */
function addItem() {

    const item = {
        id: idCounter++,
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        unit: document.getElementById("unit").value,
        quantity: parseFloat(document.getElementById("quantity").value),
        threshold: parseFloat(document.getElementById("threshold").value),
        usage_rate: parseFloat(document.getElementById("usage_rate").value) || 0,
        expiry: document.getElementById("expiry").value
    };

    inventory.push(item);
    render();
}

/* DAYS LEFT */
function daysLeft(item) {
    if(!item.usage_rate) return "N/A";
    return (item.quantity / item.usage_rate).toFixed(1);
}

/* RENDER */
function render() {

    const list = document.getElementById("list");
    const alerts = document.getElementById("alerts");

    list.innerHTML = "";
    alerts.innerHTML = "";

    let lowCount = 0;

    inventory.forEach(item => {

        const isLow = item.quantity <= item.threshold;

        if(isLow) {
            lowCount++;
            alerts.innerHTML += `<div class="alert">⚠️ Low stock: ${item.name}</div>`;
        }

        list.innerHTML += `
        <div class="item ${isLow ? 'low':''}">
            <strong>${item.name}</strong> 
            <span class="tag">${item.category}</span><br><br>

            📦 ${item.quantity} ${item.unit}<br>
            ⏳ Days Left: ${daysLeft(item)}<br>
            📅 Expiry: ${item.expiry || "N/A"}<br>

            <button onclick="useItem(${item.id})">Use Item</button>
        </div>`;
    });

    document.getElementById("total").innerText = inventory.length;
    document.getElementById("low").innerText = lowCount;
    document.getElementById("types").innerText =
        [...new Set(inventory.map(i => i.category))].length;
}

/* USE ITEM */
function useItem(id) {
    const item = inventory.find(i => i.id === id);
    if(item) {
        item.quantity -= 1;
        if(item.quantity < 0) item.quantity = 0;
    }
    render();
}

</script>

</body>
</html>
```
