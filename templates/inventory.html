<!DOCTYPE html>
<html>
<head>
<title>Inventory Manager | CropAI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#0b1410;
    --card:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);
    --primary:#c4ff61;
    --accent:#7affd8;
    --danger:#ff6b6b;
    --warning:#ffb84d;
    --text:#eaf9e6;
    --sub:#9db59a;
}

body {font-family:"Outfit";background:linear-gradient(#0b1410,#0f1d15);color:var(--text);margin:0;}

.header {padding:1.5rem 5%;border-bottom:1px solid var(--border);}

.dashboard {display:grid;grid-template-columns:2fr 1fr;gap:2rem;padding:2rem 5%;}

.card {background:var(--card);border:1px solid var(--border);padding:1.5rem;border-radius:18px;margin-bottom:1rem;}

input,select{width:100%;padding:12px;margin-top:8px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);}

button{margin-top:12px;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--accent));cursor:pointer;}

#list{max-height:400px;overflow-y:auto;}

.item{padding:14px;border-radius:12px;margin-bottom:10px;background:rgba(255,255,255,0.04);}
.low{border:1px solid var(--danger);}
.risk{border:1px solid var(--warning);}

.tag{font-size:12px;padding:3px 8px;border-radius:8px;background:rgba(255,255,255,0.1);}

.alert{padding:10px;border-radius:10px;margin-top:8px;}
.low-alert{background:rgba(255,107,107,0.15);border:1px solid var(--danger);}
.risk-alert{background:rgba(255,184,77,0.15);border:1px solid var(--warning);}

.summary-box{
    background:rgba(255,255,255,0.04);
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="header">
<h1>📦 Smart Inventory Manager</h1>
<p>AI-powered risk & planning system</p>
</div>

<div class="dashboard">

<!-- LEFT -->
<div>

<div class="card">
<h3>Add Item</h3>

<input id="name" placeholder="Item Name">

<select id="category" onchange="updateUnits()">
<option>Seeds</option>
<option>Fertilizer</option>
<option>Pesticide</option>
<option>Equipment</option>
<option>Tools</option>
<option>Fuel</option>
</select>

<select id="unit"></select>

<input id="quantity" type="number" placeholder="Quantity">
<input id="threshold" type="number" placeholder="Low Threshold">
<input id="usage_rate" type="number" placeholder="Daily Usage">
<input id="expiry" type="date">

<button onclick="addItem()">Add Item</button>
</div>

<div class="card">
<h3>Inventory</h3>
<div id="list"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<h3>⚠️ Smart Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>🧠 AI Summary</h3>
<button onclick="generateSummary()">Generate AI Insights</button>
<div id="summary" class="summary-box">No insights yet</div>
</div>

</div>

</div>

<script>

let inventory=[];

const unitMap={
Seeds:["kg","grams"],
Fertilizer:["kg","bags"],
Pesticide:["liters","ml"],
Equipment:["units"],
Tools:["units"],
Fuel:["liters"]
};

function updateUnits(){
    const cat=document.getElementById("category").value;
    const unit=document.getElementById("unit");
    unit.innerHTML="";
    unitMap[cat].forEach(u=>unit.innerHTML+=`<option>${u}</option>`);
}
updateUnits();

// ======================
// LOAD
// ======================
async function loadInventory(){
    const res=await fetch("/api/inventory");
    const data=await res.json();
    inventory=data.inventory||[];
    render();
}

// ======================
// ADD
// ======================
async function addItem(){

    const item={
        name:name.value,
        category:category.value,
        unit:unit.value,
        quantity:parseFloat(quantity.value),
        threshold:parseFloat(threshold.value),
        usage_rate:parseFloat(usage_rate.value),
        expiry:expiry.value
    };

    await fetch("/api/inventory/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(item)});
    loadInventory();
}

// ======================
// USE
// ======================
async function useItem(id){
    await fetch("/api/inventory/use",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});
    loadInventory();
}

// ======================
// RISK LOGIC
// ======================
function checkRisk(item){

    let risks=[];

    if(item.quantity<=item.threshold){
        risks.push("Low stock");
    }

    if(item.usage_rate && (item.quantity/item.usage_rate)<3){
        risks.push("Will run out soon");
    }

    if(item.expiry){
        const days=(new Date(item.expiry)-new Date())/(1000*60*60*24);
        if(days<5) risks.push("Expiring soon");
    }

    return risks;
}

// ======================
// RENDER
// ======================
function render(){

    const list=document.getElementById("list");
    const alerts=document.getElementById("alerts");

    list.innerHTML="";
    alerts.innerHTML="";

    inventory.forEach(item=>{

        const risks=checkRisk(item);
        const isLow=item.quantity<=item.threshold;

        if(risks.length){
            alerts.innerHTML+=`<div class="alert ${isLow?'low-alert':'risk-alert'}">⚠️ ${item.name}: ${risks.join(", ")}</div>`;
        }

        list.innerHTML+=`
        <div class="item ${isLow?'low':''} ${risks.length?'risk':''}">
            <strong>${item.name}</strong>
            <span class="tag">${item.category}</span><br><br>

            📦 ${item.quantity} ${item.unit}<br>
            ⏳ ${(item.quantity/(item.usage_rate||1)).toFixed(1)} days left<br>

            <button onclick="useItem(${item.id})">Use</button>
        </div>`;
    });
}

// ======================
// 🧠 AI SUMMARY
// ======================
async function generateSummary(){

    const res=await fetch("/api/inventory/summary",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({inventory})
    });

    const data=await res.json();

    document.getElementById("summary").innerText =
        data.summary || "No insights available";
}

// INIT
loadInventory();

</script>

</body>
</html>
