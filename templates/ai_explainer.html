<!DOCTYPE html>
<html>
<head>
<title>AI Explainer | CropAI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL DESIGN SYSTEM
========================= */
:root {
    --bg: #0b1410;
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --primary: #c4ff61;
    --text: #eaf9e6;
    --subtext: #9db59a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Outfit", sans-serif;
    background: linear-gradient(180deg, #0b1410, #0f1d15);
    color: var(--text);
}

/* =========================
   HEADER
========================= */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 5%;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

.header h2 {
    font-weight: 600;
}

/* =========================
   INPUT BAR
========================= */
.input-box {
    display: flex;
    gap: 10px;
    padding: 1.2rem 5%;
    border-bottom: 1px solid var(--border);
}

.input-box input,
.input-box select {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 12px;
    color: var(--text);
    outline: none;
}

.input-box input {
    flex: 1;
}

.input-box input:focus {
    border: 1px solid var(--primary);
}

button {
    background: var(--primary);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    transform: scale(1.05);
}

/* =========================
   LAYOUT
========================= */
.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 2rem;
    padding: 2rem 5%;
}

/* =========================
   TEXT PANEL
========================= */
.text-panel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

/* CARD */
.card {
    background: var(--card);
    padding: 1.2rem;
    border-radius: 16px;
    border: 1px solid transparent;
    transition: 0.3s ease;
}

.card:hover {
    border: 1px solid var(--border);
    transform: translateY(-3px);
}

.card.active {
    border: 1px solid var(--primary);
    box-shadow: 0 0 10px rgba(196,255,97,0.3);
}

.card h3 {
    margin-bottom: 8px;
}

.card p {
    color: var(--subtext);
    line-height: 1.5;
    margin-bottom: 10px;
}

/* =========================
   AUDIO PANEL
========================= */
.audio-panel {
    position: sticky;
    top: 100px;
}

.audio-card {
    background: var(--card);
    padding: 1.5rem;
    border-radius: 16px;
    border: 1px solid var(--border);
}

.audio-card h4 {
    margin-bottom: 10px;
}

audio {
    width: 100%;
    margin-top: 10px;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
    }

    .audio-panel {
        position: relative;
        top: 0;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>🧠 AI Farming Explainer</h2>
    <p style="color: var(--subtext)">CropAI Intelligence</p>
</div>

<!-- INPUT -->
<div class="input-box">
    <input id="query" placeholder="Ask something (e.g. soil preparation)">
    
    <select id="language">
        <option value="english">English</option>
        <option value="hindi">Hindi</option>
        <option value="tamil">Tamil</option>
    </select>

    <button onclick="generateLesson()">Generate</button>
</div>

<!-- MAIN -->
<div class="container">

    <!-- TEXT -->
    <div class="text-panel" id="lessonContainer"></div>

    <!-- AUDIO -->
    <div class="audio-panel">
        <div class="audio-card">
            <h4>🎧 Audio Explanation</h4>
            <audio id="audioPlayer" controls></audio>
            <p id="nowPlaying" style="margin-top:10px; color: var(--subtext);"></p>
        </div>
    </div>

</div>

<script>

async function generateLesson() {

    const query = document.getElementById("query").value.trim();
    const language = document.getElementById("language").value;
    const container = document.getElementById("lessonContainer");

    // ✅ Input validation
    if (!query) {
        alert("Please enter a topic");
        return;
    }

    // ✅ Loading state
    container.innerHTML = "<p style='color: var(--subtext)'>⏳ Generating lesson...</p>";

    try {
        const res = await fetch("/api/ai-explainer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user_input: query,
                language: language
            })
        });

        const data = await res.json();

        // ✅ Error handling
        if (data.error) {
            container.innerHTML = `<p style="color:red;">❌ ${data.error}</p>`;
            return;
        }

        renderLesson(data.lesson, data.audio_chunks);

    } catch (err) {
        container.innerHTML = `<p style="color:red;">⚠️ Failed to connect to server</p>`;
    }
}


function renderLesson(lesson, audioMap) {

    const container = document.getElementById("lessonContainer");
    container.innerHTML = "";

    Object.keys(lesson).forEach(key => {

        const value = lesson[key];
        let contentHTML = "";

        // ✅ STRING
        if (typeof value === "string") {
            contentHTML = `<p>${value}</p>`;
        }

        // ✅ ARRAY
        else if (Array.isArray(value)) {
            contentHTML = "<ul>" + value.map(v => `<li>${v}</li>`).join("") + "</ul>";
        }

        // ✅ OBJECT (Timeline etc)
        else if (typeof value === "object" && value !== null) {
            contentHTML = "<ul>" +
                Object.entries(value).map(([k, v]) => `<li><b>${k}:</b> ${v}</li>`).join("") +
                "</ul>";
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${key}</h3>
            ${contentHTML}
            ${audioMap[key] ? `<button onclick="playAudio('${key}', this)">▶ Play Audio</button>` : ""}
        `;

        container.appendChild(card);
    });

    window.audioMap = audioMap;

    // ✅ Auto-play first section (optional UX boost)
    const firstKey = Object.keys(audioMap)[0];
    if (firstKey) {
        const firstBtn = document.querySelector(".card button");
        if (firstBtn) {
            playAudio(firstKey, firstBtn);
        }
    }
}


function playAudio(section, btn) {

    const audio = document.getElementById("audioPlayer");

    // ✅ Reset before playing
    audio.pause();
    audio.currentTime = 0;

    audio.src = window.audioMap[section];
    audio.play();

    document.getElementById("nowPlaying").innerText = "Playing: " + section;

    // ✅ Highlight active card
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    btn.closest(".card").classList.add("active");
}


// ✅ Enter key support
document.getElementById("query").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        generateLesson();
    }
});

</script>


</body>
</html>
